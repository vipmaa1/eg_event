services:
  nginx:
    image: nginx:alpine
    container_name: eventhub-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_public:/var/www/public:ro
      - backend_storage:/var/www/storage:ro
    depends_on:
      - backend
      - web
    restart: unless-stopped
    networks:
      - eventhub

  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    container_name: eventhub-api
    env_file:
      - backend/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mariadb
      - DB_DATABASE=eventhub
      - DB_USERNAME=eventhub
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass}
      - SANCTUM_STATEFUL_DOMAINS=${APP_DOMAIN:-localhost}
      - APP_URL=https://${APP_DOMAIN:-localhost}
    volumes:
      - backend_storage:/app/storage
      - backend_public:/app/public
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - eventhub

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
    container_name: eventhub-web
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://${APP_DOMAIN:-localhost}/api
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - eventhub

  mariadb:
    image: mariadb:11
    container_name: eventhub-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: eventhub
      MYSQL_USER: eventhub
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 10s
      retries: 10
      interval: 10s
    restart: unless-stopped
    networks:
      - eventhub

  redis:
    image: redis:7-alpine
    container_name: eventhub-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redispass}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - eventhub

volumes:
  mariadb_data:
  redis_data:
  backend_storage:
  backend_public:

networks:
  eventhub:
    driver: bridge
